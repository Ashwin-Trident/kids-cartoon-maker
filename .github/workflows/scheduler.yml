name: 🎨 Auto Create & Upload Cartoon

on:
  workflow_dispatch:
    inputs:
      rhyme:
        description: "Rhyme name (empty = random)"
        required: false
        default: ""
      privacy:
        description: "YouTube privacy"
        required: false
        default: "unlisted"
        type: choice
        options: [public, unlisted, private]
      music_theme:
        description: "Music theme"
        required: false
        default: "playful"
        type: choice
        options: [playful, dreamy, adventure, lullaby]
  schedule:
    - cron: "0 10 * * *"

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: ⚙️ Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core imagemagick

      - name: 📦 Install Python packages
        run: pip install -r requirements.txt

      - name: 🔐 Build YouTube credentials from refresh token
        run: |
          mkdir -p credentials
          echo '${{ secrets.YT_CLIENT_SECRETS }}' > credentials/client_secrets.json
          python - << 'EOF'
          import pickle, json
          from google.oauth2.credentials import Credentials

          with open("credentials/client_secrets.json") as f:
              data = json.load(f)

          app = data.get("installed") or data.get("web")

          creds = Credentials(
              token=None,
              refresh_token="${{ secrets.YT_REFRESH_TOKEN }}",
              token_uri="https://oauth2.googleapis.com/token",
              client_id=app["client_id"],
              client_secret=app["client_secret"],
              scopes=[
                  "https://www.googleapis.com/auth/youtube.upload",
                  "https://www.googleapis.com/auth/youtube",
              ],
          )

          with open("credentials/token.pickle", "wb") as f:
              pickle.dump(creds, f)

          print("✅ Credentials built from refresh token")
          EOF

      - name: 🎬 Generate & Upload
        run: |
          RHYME="${{ github.event.inputs.rhyme }}"
          PRIVACY="${{ github.event.inputs.privacy || 'unlisted' }}"
          MUSIC="${{ github.event.inputs.music_theme || 'playful' }}"
          [ -z "$RHYME" ] && RHYME_FLAG="--random" || RHYME_FLAG="--rhyme $RHYME"
          python main.py $RHYME_FLAG --music "$MUSIC" --output output/video.mp4 --upload --privacy "$PRIVACY"

      - name: 💾 Save video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cartoon-${{ github.run_number }}
          path: output/video.mp4
          retention-days: 7
