name: 🎨 Auto Create & Upload Cartoon

on:
  workflow_dispatch:
    inputs:
      rhyme:
        description: "Rhyme name (empty = random)"
        required: false
        default: ""
      privacy:
        description: "YouTube privacy"
        required: false
        default: "unlisted"
        type: choice
        options: [public, unlisted, private]
      music_theme:
        description: "Music theme"
        required: false
        default: "playful"
        type: choice
        options: [playful, dreamy, adventure, lullaby]
  schedule:
    - cron: "0 10 * * *"

jobs:
  create-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
          cache: pip

      - name: ⚙️ Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core imagemagick

      - name: 📦 Install Python packages
        run: pip install -r requirements.txt

      - name: 🔐 Restore YouTube credentials
        run: |
          mkdir -p credentials
          echo '${{ secrets.YT_CLIENT_SECRETS }}' > credentials/client_secrets.json
          echo '${{ secrets.YT_TOKEN }}' | base64 --decode > credentials/token.pickle
          [ -s credentials/client_secrets.json ] || { echo "❌ YT_CLIENT_SECRETS missing!"; exit 1; }
          [ -s credentials/token.pickle ] || { echo "❌ YT_TOKEN missing!"; exit 1; }
          echo "✅ Credentials ready"

      - name: 🎬 Generate & Upload
        run: |
          RHYME="${{ github.event.inputs.rhyme }}"
          PRIVACY="${{ github.event.inputs.privacy || 'unlisted' }}"
          MUSIC="${{ github.event.inputs.music_theme || 'playful' }}"
          [ -z "$RHYME" ] && RHYME_FLAG="--random" || RHYME_FLAG="--rhyme $RHYME"
          python main.py $RHYME_FLAG --music "$MUSIC" --output output/video.mp4 --upload --privacy "$PRIVACY"

      - name: 💾 Save video artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cartoon-${{ github.run_number }}
          path: output/video.mp4
          retention-days: 7

